# ============================================================
#  .github/workflows/ci.yml
#  Calc-Calories — GitHub Actions CI/CD Pipeline
#  Runs on: push to main/develop, PRs to main
# ============================================================

name: CI — Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  FLUTTER_VERSION: "3.24.0"

jobs:

  # ── Backend: Node.js Tests ─────────────────────────────────────
  backend-test:
    name: Backend Tests (Node.js)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: calc_calories_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    env:
      DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/calc_calories_test
      REDIS_URL: redis://localhost:6379
      GEMINI_API_KEY: test-key-not-real
      JWT_SECRET: test-jwt-secret-for-ci-pipeline-only
      JWT_EXPIRES_IN: 1h
      NODE_ENV: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push database schema
        run: npx prisma db push --skip-generate

      - name: Run TypeScript type check
        run: npx tsc --noEmit

      - name: Run Jest tests
        run: npm test -- --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: coverage/
          retention-days: 7

  # ── Backend: Docker Build Validation ──────────────────────────
  backend-docker:
    name: Backend Docker Build
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (validation only)
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          target: production
          push: false
          tags: calc-calories-api:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Flutter: Analyze & Test ────────────────────────────────────
  flutter-test:
    name: Flutter Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: calc_calories_app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate Hive type adapters
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib/

      - name: Run Flutter analyzer
        run: flutter analyze --no-fatal-infos

      - name: Run Flutter tests
        run: flutter test --coverage

      - name: Upload Flutter coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flutter-coverage
          path: teneen_app/coverage/
          retention-days: 7

  # ── Status Badge ───────────────────────────────────────────────
  ci-success:
    name: "CI: All Checks Passed"
    runs-on: ubuntu-latest
    needs: [backend-test, backend-docker, flutter-test]
    if: success()
    steps:
      - name: All checks passed
        run: echo "✅ Build Passing — All CI checks completed successfully."
